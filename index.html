function rigSVG(name){
  const r=RIGS[name]; if(!r) return '';
  const dur=r.t||2.6;
  const A=`dur="${dur}s" repeatCount="indefinite" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.45 0 0.55 1;0.45 0 0.55 1"`;
  let s='<svg class="rig" viewBox="0 0 200 160" xmlns="http://www.w3.org/2000/svg">';
  for(const it of (r.s||[])){
    const p=it.split(',');
    if(p[0]==='c') s+=`<circle class="bd hd" cx="${p[1]}" cy="${p[2]}" r="${p[3]}"/>`;
    else if(p[0]==='l') s+=`<line class="bd" x1="${p[1]}" y1="${p[2]}" x2="${p[3]}" y2="${p[4]}"/>`;
    else if(p[0]==='B') s+=`<line class="bn" x1="${p[1]}" y1="${p[2]}" x2="${p[3]}" y2="${p[4]}"/>`;
    else if(p[0]==='g') s+=`<line class="gd" x1="${p[1]}" y1="${p[2]}" x2="${p[3]}" y2="${p[4]}"/>`;
    else if(p[0]==='p') s+=`<polyline class="bd" points="${it.slice(2)}"/>`;
  }
  for(const [a,b] of (r.m||[]))
    s+=`<polyline class="bd" points="${a}"><animate attributeName="points" values="${a};${b};${a}" ${A}/></polyline>`;
  for(const d of (r.d||[])){
    const f=d[0], t=d[1], head=d[2]==='head';
    s+=`<circle class="${head?'bd hd':'db'}" r="${head?10:5.5}" cx="${f[0]}" cy="${f[1]}">`
      +`<animate attributeName="cx" values="${f[0]};${t[0]};${f[0]}" ${A}/>`
      +`<animate attributeName="cy" values="${f[1]};${t[1]};${f[1]}" ${A}/></circle>`;
  }
  return s+'</svg>';
}

{dw:'日',rest:true,title:'完全休養',sub:'回復こそ成長'}

const TIPS=`<div class="tips"><h4>💡 プログラムの進め方</h4>
<p><b>重量の決め方:</b>目安はあくまで出発点。「指定回数の下限が、最後の2回キツいけど正しいフォームでできる重さ」が正解。楽なら次セットで上げ、フォームが崩れるなら下げる。</p>
<p><b>進歩のルール:</b>全セットで回数の上限に届いたら、次回から+1〜2.5kg。これだけ守れば必ず伸びる。</p>
<p><b>ウォームアップ:</b>各日の最初の種目だけ、本番の半分の重さ×15回を1〜2セット。</p>
<p><b>時間管理:</b>休憩はコンパウンド90秒・アイソレーション60秒厳守で40分に収まる。休憩タイマーを活用。</p>
<p><b>見た目重視の鍵:</b>サイドレイズとリア系は「軽く・丁寧に・週2回」。ここが肩幅と逆三角形を決める。</p>
<p><b>栄養:</b>タンパク質は体重×2g/日(約130g)、睡眠7時間以上。ここをサボると週6が無駄になる。</p></div>`;
/* ===== 記録(localStorage) ===== */
const LS='fit40-logs-v1';
const loadLogs=()=>{try{return JSON.parse(localStorage.getItem(LS))||{}}catch(e){return {}}};
const saveLogs=o=>{try{localStorage.setItem(LS,JSON.stringify(o))}catch(e){}};
const today=()=>{const d=new Date(),z=n=>String(n).padStart(2,'0');return `${d.getFullYear()}-${z(d.getMonth()+1)}-${z(d.getDate())}`};
const fmtSets=sets=>sets.map(s=>`${s[0]}kg×${s[1]}`).join(' / ');
function lastEntry(name,excludeToday){
  const arr=loadLogs()[name]||[];
  for(let i=arr.length-1;i>=0;i--){ if(!excludeToday||arr[i].d!==today()) return arr[i]; }
  return null;
}
function todayEntry(name){ const arr=loadLogs()[name]||[]; const e=arr[arr.length-1]; return (e&&e.d===today())?e:null; }

/* ===== 描画 ===== */
const $=s=>document.querySelector(s);
let curDay=0;
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function buildTabs(){
  const t=(new Date().getDay()+6)%7; // 月=0 … 日=6
  $('#tabs').innerHTML=PROGRAM.map((p,i)=>
    `<button class="tab${i===curDay?' on':''}${i===t?' today':''}" data-day="${i}">`+
    `<span class="dw">${p.dw}${i===t?'・今日':''}</span>${p.rest?'休養':esc(p.title.split('|')[0])}</button>`).join('');
}
function card(ex,key){
  const prev=lastEntry(ex.n,true), te=todayEntry(ex.n);
  const lastW=(te&&te.sets.length?te.sets[te.sets.length-1][0]:(prev&&prev.sets.length?prev.sets[prev.sets.length-1][0]:''));
  return `<details class="card">
  <summary>
    <div><span class="c-name">${esc(ex.n)}</span><span class="c-tag">${esc(ex.tag)}</span></div>
    <div class="c-meta"><span class="chip st">${esc(ex.set)}</span>${ex.kg?`<span class="chip kg">目安 ${esc(ex.kg)}</span>`:''}<span class="chip">休憩 ${ex.rest}秒</span></div>
    <span class="chev">▾</span>
  </summary>
  <div class="c-body">
    ${ex.note?`<div class="note">⚙ ${esc(ex.note)}</div>`:''}
    <div class="animwrap">${rigSVG(ex.rig)}</div>
    <div class="sec"><h4>🎯 意識するポイント</h4><ul>${ex.pt.map(x=>`<li>${esc(x)}</li>`).join('')}</ul></div>
    <div class="sec fm"><h4>📋 フォーム手順</h4><ol>${ex.fm.map(x=>`<li>${esc(x)}</li>`).join('')}</ol></div>
    <div class="sec ngs"><h4>⚠️ よくあるミス</h4><ul>${ex.ng.map(x=>`<li>${esc(x)}</li>`).join('')}</ul></div>
    <div class="log" data-ex="${esc(ex.n)}">
      <h4>📈 記録</h4>
      <div class="log-prev">${prev?`前回 (${prev.d.slice(5).replace('-','/')}): ${fmtSets(prev.sets)}`:'前回の記録なし'}</div>
      <div class="log-today">${te&&te.sets.length?'今日: '+fmtSets(te.sets):''}</div>
      <div class="log-in">
        <input type="number" step="0.5" min="0" inputmode="decimal" placeholder="kg" value="${lastW}" data-w>
        <input type="number" min="0" inputmode="numeric" placeholder="回数" data-r>
        <button class="btn ac" data-act="add">記録</button>
        <button class="btn" data-act="undo">戻す</button>
      </div>
      <button class="btn tm" data-act="timer" data-rest="${ex.rest}">⏱ 休憩タイマー ${ex.rest}秒</button>
    </div>
  </div></details>`;
}
function render(){
  buildTabs();
  const p=PROGRAM[curDay], m=$('#main');
  if(p.rest){
    m.innerHTML=`<div class="dayhead"><h2>${p.dw}曜日|${esc(p.title)}</h2><p>${esc(p.sub)}</p></div>
    <div class="restday"><h3>🛌 今日は休む日</h3>
    <p>筋肉はトレーニング中ではなく、休んでいる間に成長します。週6でやり切るために、今日は完全オフ。</p>
    <p>・睡眠7時間以上を最優先<br>・タンパク質は休みの日も体重×2g<br>・軽い散歩やストレッチはOK(血流促進で回復が早まる)</p>
    <p>肩や腰に違和感があれば、翌週は重量を10%落として様子見を。</p></div>${TIPS}`;
    return;
  }
  m.innerHTML=`<div class="dayhead"><h2>${p.dw}曜日|${esc(p.title)}</h2><p>${esc(p.sub)}</p></div>`
    +p.ex.map((e,i)=>card(e,i)).join('')+TIPS;
}
function refreshLog(box){
  const name=box.dataset.ex, prev=lastEntry(name,true), te=todayEntry(name);
  box.querySelector('.log-prev').textContent=prev?`前回 (${prev.d.slice(5).replace('-','/')}): ${fmtSets(prev.sets)}`:'前回の記録なし';
  box.querySelector('.log-today').textContent=te&&te.sets.length?'今日: '+fmtSets(te.sets):'';
}

/* ===== 操作 ===== */
document.addEventListener('click',ev=>{
  const tab=ev.target.closest('.tab');
  if(tab){curDay=+tab.dataset.day; render(); window.scrollTo({top:0}); return;}
  const btn=ev.target.closest('[data-act]');
  if(!btn) return;
  const box=btn.closest('.log');
  if(btn.dataset.act==='add'){
    const w=parseFloat(box.querySelector('[data-w]').value), r=parseInt(box.querySelector('[data-r]').value,10);
    if(isNaN(w)||isNaN(r)||r<=0){box.querySelector('[data-r]').focus();return;}
    const logs=loadLogs(), name=box.dataset.ex, arr=logs[name]=logs[name]||[];
    let e=arr[arr.length-1];
    if(!e||e.d!==today()){e={d:today(),sets:[]};arr.push(e);}
    e.sets.push([w,r]); saveLogs(logs); refreshLog(box);
    box.querySelector('[data-r]').value='';
  }else if(btn.dataset.act==='undo'){
    const logs=loadLogs(), arr=logs[box.dataset.ex]||[], e=arr[arr.length-1];
    if(e&&e.d===today()&&e.sets.length){e.sets.pop(); if(!e.sets.length)arr.pop(); saveLogs(logs); refreshLog(box);}
  }else if(btn.dataset.act==='timer'){
    startRest(+btn.dataset.rest);
  }
});

/* ===== 休憩タイマー ===== */
let tInt=null;
function beep(){
  try{
    const c=new (window.AudioContext||window.webkitAudioContext)();
    [0,.25,.5].forEach(t=>{
      const o=c.createOscillator(),g=c.createGain();
      o.connect(g);g.connect(c.destination);
      o.frequency.value=880;g.gain.setValueAtTime(.25,c.currentTime+t);
      g.gain.exponentialRampToValueAtTime(.001,c.currentTime+t+.2);
      o.start(c.currentTime+t);o.stop(c.currentTime+t+.22);
    });
  }catch(e){}
  if(navigator.vibrate)navigator.vibrate([200,100,200]);
}
function startRest(sec){
  clearInterval(tInt);
  const bar=$('#tbar'),left=$('#tleft'),fill=$('#tfill');
  let rem=sec; bar.classList.add('show'); bar.classList.remove('done');
  const draw=()=>{left.textContent=`${Math.floor(rem/60)}:${String(rem%60).padStart(2,'0')}`;fill.style.width=(rem/sec*100)+'%';};
  draw();
  tInt=setInterval(()=>{
    rem--;
    if(rem<=0){clearInterval(tInt);rem=0;draw();left.textContent='完了!';bar.classList.add('done');beep();
      setTimeout(()=>bar.classList.remove('show'),4000);return;}
    draw();
  },1000);
}
$('#tstop').addEventListener('click',()=>{clearInterval(tInt);$('#tbar').classList.remove('show');});

/* ===== 起動:今日の曜日を自動選択 ===== */
curDay=(new Date().getDay()+6)%7;
render();
</script>
